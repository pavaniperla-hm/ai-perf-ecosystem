---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: perf-demo-users
  namespace: perf-demo
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /users$1
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/users(/?.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 80
---
