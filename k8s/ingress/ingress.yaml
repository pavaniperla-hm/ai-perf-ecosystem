---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: perf-demo-frontend
  namespace: perf-demo
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
