services:

  # ── Databases ──────────────────────────────────────────────────────────────

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application Services ───────────────────────────────────────────────────

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@user-db:5432/userdb
      SERVICE_PORT: "8001"
    ports:
      - "8001:8001"
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s   # allows time for 10 K seed

  product-service:
    build: ./product-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@product-db:5432/productdb
      SERVICE_PORT: "8002"
    ports:
      - "8002:8002"
    depends_on:
      product-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s   # allows time for 5 K seed

  order-service:
    build: ./order-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@order-db:5432/orderdb
      SERVICE_PORT: "8003"
    ports:
      - "8003:8003"
    depends_on:
      order-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s  # allows time for 50 K seed

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  user-db-data:
  product-db-data:
  order-db-data:
