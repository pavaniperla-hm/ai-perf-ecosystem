server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # SPA fallback — serve index.html for all non-file routes
    # Note: /api/ requests are handled by the ingress controller (k8s)
    # or the upstream nginx gateway (docker-compose) before reaching here
    location / {
        try_files $uri $uri/ /index.html;
    }
}
