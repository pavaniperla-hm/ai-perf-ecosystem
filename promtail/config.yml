server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push
    basic_auth:
      username: ${LOKI_USERNAME}
      password: ${LOKI_PASSWORD}

scrape_configs:

  # ── Auto-discover all Docker containers ──────────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only collect logs from containers in this Compose project
          - name: label
            values: ["com.docker.compose.project=demo"]

    relabel_configs:
      # Use the Compose service name as the `service` label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

      # Keep the container name for reference
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container

      # Add a static job label
      - target_label: job
        replacement: docker-compose

    pipeline_stages:
      # Attempt to parse JSON log lines (FastAPI / Express emit JSON)
      - json:
          expressions:
            level: level
            msg: msg
            message: message
      # Promote parsed level to a Loki label for filtering
      - labels:
          level:
