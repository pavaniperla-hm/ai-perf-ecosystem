events {
    worker_connections 2048;
}

http {
    access_log /var/log/nginx/access.log;

    upstream user_service {
        server user-service:8001;
        keepalive 32;
    }

    upstream product_service {
        server product-service:8002;
        keepalive 32;
    }

    upstream order_service {
        server order-service:8003;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Gateway health check
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"api-gateway"}';
        }

        # User Service  — /api/users[/...] → /users[/...]
        location /api/users {
            rewrite ^/api/users(/.*)?$ /users$1 break;
            proxy_pass         http://user_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Product Service — /api/products[/...] → /products[/...]
        location /api/products {
            rewrite ^/api/products(/.*)?$ /products$1 break;
            proxy_pass         http://product_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Order Service  — /api/orders[/...] → /orders[/...]
        location /api/orders {
            rewrite ^/api/orders(/.*)?$ /orders$1 break;
            proxy_pass         http://order_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
